name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/.swiftpm
            ~/.cache/org.swift.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-release-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            swiftpm-release-${{ runner.os }}-

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --provenance --access public
